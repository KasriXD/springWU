<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FALKEN - Inställningar</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h2><a href="index.html">FALKEN</a></h2>
        <div class="search-bar">
            <input type="text" placeholder="Sök...">
            <a href="search.html">
                <button>Sök</button>
            </a>
        </div>
        <a href="settings.html">⚙️</a>
    </header>
    <div class="settings-page">
        <h3>Inställningar</h3>
        <div class="setting">
            <label>Tema</label>
            <select>
                <option>Ljusblå (Standard)</option>
                <option>Mörkt</option>
                <option>Vitt</option>
            </select>
        </div>
        <div class="setting">
            <label>Språk</label>
            <select>
                <option>Svenska</option>
                <option>Engelska</option>
                <option>Spanska</option>
            </select>
        </div>
        <div class="setting">
            <label>Autoplay</label>
            <input type="checkbox" checked>
        </div>
        <div class="setting">
            <label>Notiser</label>
            <input type="checkbox">
        </div>

        <div class="setting">
            <label>Spara historik</label>
            <input type="checkbox" checked>
        </div>

        <div class="setting">
            <label>Dataskydd</label>
            <select>
                <option>Hög</option>
                <option>Medium</option>
                <option>Låg</option>
            </select>
        </div>

        <div class="setting">
            <label>Videokvalitet</label>
            <select>
                <option>Auto</option>
                <option>1080p</option>
                <option>720p</option>
                <option>480p</option>
            </select>
        </div>
        <button class="save-btn">Spara</button>
    </div>
</body>
</html>
